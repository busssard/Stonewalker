{% extends 'layouts/default/page.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="my-stones-split">
  <div class="my-stones-left">
    <div class="stone-header flex-center gap-1-5 justify-between">
      <h2 id="creations-title" class="mb-0">{% trans 'My CREATIONS' %}</h2>
      <div class="stone-sort-row mb-0">
        <label class="stone-sort-label" for="creations-sort">{% trans 'Sort by:' %}</label>
        <select id="creations-sort" class="stone-sort-dropdown">
          <option value="distance_min">{% trans 'Distance traveled (min)' %}</option>
          <option value="distance_max">{% trans 'Distance traveled (max)' %}</option>
          <option value="moves_min">{% trans 'Number of moves (min)' %}</option>
          <option value="moves_max">{% trans 'Number of moves (max)' %}</option>
          <option value="youngest">{% trans 'Youngest' %}</option>
          <option value="oldest">{% trans 'Oldest' %}</option>
        </select>
      </div>
    </div>
    <div class="stone-list" id="creations-list"></div>
    <div class="page-arrows">
      <button class="arrow-btn" id="creations-prev" disabled title="{% trans 'Previous page' %}"><img src="{% static 'arrow_left.png' %}" alt="{% trans 'Previous' %}"></button>
      <span id="creations-page-info" class="fs-1-1"></span>
      <button class="arrow-btn" id="creations-next" disabled title="{% trans 'Next page' %}"><img src="{% static 'arrow_right.png' %}" alt="{% trans 'Next' %}"></button>
    </div>
  </div>
  <div class="my-stones-right">
    <div class="stone-header right flex-center gap-1-5 justify-between">
      <h2 id="interactions-title" class="mb-0">{% trans 'MY INTERACTIONS' %}</h2>
      <div class="stone-sort-row mb-0">
        <label class="stone-sort-label" for="interactions-sort">{% trans 'Sort by:' %}</label>
        <select id="interactions-sort" class="stone-sort-dropdown">
          <option value="distance_min">{% trans 'Distance traveled (min)' %}</option>
          <option value="distance_max">{% trans 'Distance traveled (max)' %}</option>
          <option value="moves_min">{% trans 'Number of moves (min)' %}</option>
          <option value="moves_max">{% trans 'Number of moves (max)' %}</option>
          <option value="youngest">{% trans 'Youngest' %}</option>
          <option value="oldest">{% trans 'Oldest' %}</option>
        </select>
      </div>
    </div>
    <div class="stone-list" id="interactions-list"></div>
    <div class="page-arrows">
      <button class="arrow-btn" id="interactions-prev" disabled title="{% trans 'Previous page' %}"><img src="{% static 'arrow_left.png' %}" alt="{% trans 'Previous' %}"></button>
      <span id="interactions-page-info" class="fs-1-1"></span>
      <button class="arrow-btn" id="interactions-next" disabled title="{% trans 'Next page' %}"><img src="{% static 'arrow_right.png' %}" alt="{% trans 'Next' %}"></button>
    </div>
  </div>
</div>
<!-- Gallery modal placeholder -->
<div id="stone-gallery-modal" class="display-none position-fixed top-0 left-0 w-100vw h-100vh bg-modal-overlay flex-center z-3000">
  <div id="stone-gallery-content" class="bg-white border-radius-18 max-w-600 w-90vw m-auto p-2 position-relative shadow-heavy">
    <span id="stone-gallery-close" class="position-absolute top-1 right-1 fs-2 cursor-pointer">&times;</span>
    <div id="stone-gallery-body"></div>
  </div>
</div>
<script>
// Prepare data arrays for client-side pagination
const creationsData = [
  {% for stone in my_stones %}
    {
      PK_stone: "{{ stone.PK_stone }}",
      description: `{{ stone.description|escapejs }}`,
      image: "{% if stone.image %}{{ stone.image.url }}{% else %}{% static 'stone.png' %}{% endif %}",
      created_at: "{{ stone.created_at|date:'c' }}",
      color: "{{ stone.color|default:'#4CAF50' }}",
      shape: "{{ stone.shape|default:'circle' }}",
      distance_km: {{ stone.distance_km|default:0|floatformat:1 }},
      username: "{{ stone.FK_user.username|escapejs }}",
      moves: [
        {% for move in stone.moves.all %}
        {
          latitude: {{ move.latitude|default:'null' }},
          longitude: {{ move.longitude|default:'null' }},
          timestamp: "{{ move.timestamp|date:'c' }}",
          timestamp_display: "{{ move.timestamp|date:'M d, Y' }}",
          image: "{% if move.image %}{{ move.image.url }}{% else %}{% static 'stone.png' %}{% endif %}",
          comment: `{{ move.comment|escapejs }}`,
          username: "{{ move.FK_user.username|escapejs }}",
          user_picture: "{{ move.FK_user.profile.get_picture_url }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ]
    }{% if not forloop.last %},{% endif %}
  {% endfor %}
];
const interactionsData = [
  {% for stone in my_interactions %}
    {
      PK_stone: "{{ stone.PK_stone }}",
      description: `{{ stone.description|escapejs }}`,
      image: "{% if stone.image %}{{ stone.image.url }}{% else %}{% static 'stone.png' %}{% endif %}",
      created_at: "{{ stone.created_at|date:'c' }}",
      color: "{{ stone.color|default:'#4CAF50' }}",
      shape: "{{ stone.shape|default:'circle' }}",
      distance_km: {{ stone.distance_km|default:0|floatformat:1 }},
      username: "{{ stone.FK_user.username|escapejs }}",
      moves: [
        {% for move in stone.moves.all %}
        {
          latitude: {{ move.latitude|default:'null' }},
          longitude: {{ move.longitude|default:'null' }},
          timestamp: "{{ move.timestamp|date:'c' }}",
          timestamp_display: "{{ move.timestamp|date:'M d, Y' }}",
          image: "{% if move.image %}{{ move.image.url }}{% else %}{% static 'stone.png' %}{% endif %}",
          comment: `{{ move.comment|escapejs }}`,
          username: "{{ move.FK_user.username|escapejs }}",
          user_picture: "{{ move.FK_user.profile.get_picture_url }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ]
    }{% if not forloop.last %},{% endif %}
  {% endfor %}
];

function renderStonesList(listId, data, page, perPage) {
  const list = document.getElementById(listId);
  list.innerHTML = '';
  if (!data.length) {
    list.innerHTML = `<div class='text-muted'>You have not ${listId === 'creations-list' ? 'added any stones yet.' : 'interacted with any stones yet. Go scan a stone to see it here!'}</div>`;
    return;
  }
  const start = page * perPage;
  const end = Math.min(start + perPage, data.length);
  for (let i = start; i < end; i++) {
    const stone = data[i];
    const item = document.createElement('div');
    item.className = 'stone-list-item';
    item.style.setProperty('--stone-color', stone.color || '#4CAF50');
    item.setAttribute('data-pk', stone.PK_stone);
    item.innerHTML = `
      <img class="stone-list-img" src="${stone.image}" alt="${stone.PK_stone}">
      <div class="stone-list-info">
        <div class="stone-list-title-row">
          <span class="stone-list-title">${stone.PK_stone}</span>
          <span class="stone-list-distance">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            ${stone.distance_km ? stone.distance_km + ' km' : '0 km'}
            <a href="/stone/${stone.PK_stone}/qr/" target="_blank" title="QR code for this stone" class="ml-1 fs-1-2 text-decoration-none">🔗 QR</a>
          </span>
        </div>
        <div class="stone-list-meta-row">
          <span>Age: ${getAgeString(stone.created_at)}</span>
          <span>Moves: ${stone.moves ? stone.moves.length : 0}</span>
        </div>
      </div>
    `;
    item.onclick = function() {
      import('/static/js/stone-modal.js').then(mod => {
        mod.openStoneModal(stone.PK_stone, stone.color, data);
      }).catch(err => {
        console.error('Failed to load stone modal:', err);
        // Fallback: create a simple modal
        showSimpleModal(stone.PK_stone, stone.color, data);
      });
    };
    list.appendChild(item);
  }
}

// Sorting logic
function sortStones(data, sortKey) {
  const arr = [...data];
  switch (sortKey) {
    case 'distance_min':
      arr.sort((a, b) => (a.distance_km || 0) - (b.distance_km || 0));
      break;
    case 'distance_max':
      arr.sort((a, b) => (b.distance_km || 0) - (a.distance_km || 0));
      break;
    case 'moves_min':
      arr.sort((a, b) => (a.moves ? a.moves.length : 0) - (b.moves ? b.moves.length : 0));
      break;
    case 'moves_max':
      arr.sort((a, b) => (b.moves ? b.moves.length : 0) - (a.moves ? a.moves.length : 0));
      break;
    case 'youngest':
      arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      break;
    case 'oldest':
      arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      break;
    default:
      break;
  }
  return arr;
}

function setupPagination(section) {
  let data = section === 'creations' ? creationsData : interactionsData;
  let page = 0;
  // Calculate how many fit: estimate by container height and item height, fallback to 8
  let perPage = 8;
  function calcPerPage() {
    const container = document.getElementById(section + '-list');
    if (!container) return 8;
    const test = document.createElement('div');
    test.className = 'stone-list-item';
    test.style.visibility = 'hidden';
    test.innerHTML = '<img class="stone-list-img" src="" alt=""><div class="stone-list-info"><div class="stone-list-title-row"><span class="stone-list-title"></span><span class="stone-list-distance"></span></div><div class="stone-list-meta-row"><span></span><span></span></div></div>';
    container.appendChild(test);
    const itemHeight = test.offsetHeight || 96;
    container.removeChild(test);
    const available = container.offsetHeight || 600;
    return Math.max(2, Math.floor(available / itemHeight));
  }
  function update() {
    sortKey = document.getElementById(`${section}-sort`).value;
    const sorted = sortStones(data, sortKey);
    perPage = calcPerPage();
    renderStonesList(section + '-list', sorted, page, perPage);
    document.getElementById(section + '-prev').disabled = page === 0;
    document.getElementById(section + '-next').disabled = (page + 1) * perPage >= sorted.length;
    document.getElementById(section + '-page-info').textContent = sorted.length ? `Page ${page + 1} of ${Math.ceil(sorted.length / perPage)}` : '';
  }
  document.getElementById(`${section}-sort`).onchange = () => { page = 0; update(); };
  document.getElementById(section + '-prev').onclick = () => { if (page > 0) { page--; update(); } };
  document.getElementById(section + '-next').onclick = () => { if ((page + 1) * perPage < data.length) { page++; update(); } };
  window.addEventListener('resize', () => { page = 0; update(); });
  update();
}
function getAgeString(created_at) {
  // created_at is in ISO format
  const created = new Date(created_at);
  if (isNaN(created.getTime())) return '';
  const now = new Date();
  const diffMs = now - created;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  if (diffDays < 7) {
    return `${diffDays.toFixed(1)} days`;
  } else if (diffDays < 28) {
    const weeks = diffDays / 7;
    return `${weeks.toFixed(1)} weeks`;
  } else if (diffDays < 365) {
    const months = diffDays / 30.4375;
    return `${months.toFixed(1)} months`;
  } else {
    const years = diffDays / 365.25;
    return `${years.toFixed(1)} years`;
  }
}

// Fallback modal function
function showSimpleModal(pk, color, data) {
  const stone = data.find(s => s.PK_stone === pk);
  if (!stone) return;
  
  const modal = document.getElementById('stone-gallery-modal');
  const modalBody = document.getElementById('stone-gallery-body');
  const closeBtn = document.getElementById('stone-gallery-close');
  
  if (!modal) {
    console.error('Modal container not found');
    return;
  }
  
  closeBtn.onclick = () => { modal.style.display = 'none'; };
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
  
  const html = `
    <div style='text-align:center;margin-bottom:1.2rem;'>
      <span style="font-family:var(--font-title);font-size:2.1rem;font-weight:700;letter-spacing:1px;color:${color};text-shadow:0 2px 8px rgba(0,0,0,0.07);">${stone.PK_stone}</span>
    </div>
    <div style="background:linear-gradient(90deg,${color}11 0%,#fff 100%);border-radius:12px;padding:1.1rem 1.3rem;margin-bottom:1.2rem;font-size:1.13rem;font-family:var(--font-serif);box-shadow:0 2px 8px rgba(0,0,0,0.04);color:#333;">${stone.description}</div>
    <div style='display:flex;justify-content:center;align-items:center;margin-bottom:1.2rem;font-size:1.05em;color:#888;font-family:monospace;gap:0;'>
      <div style='flex:1;min-width:120px;max-width:160px;text-align:center;padding:0 0.5em;'>
        <span style='display:block;font-size:0.97em;color:#aaa;'>Created</span>
        <span style='font-weight:600;color:#444;white-space:nowrap;'>${getAgeString(stone.created_at)}</span>
      </div>
      <div style='width:1px;height:2.2em;background:#eee;margin:0 0.5em;'></div>
      <div style='flex:1;min-width:80px;max-width:120px;text-align:center;padding:0 0.5em;'>
        <span style='display:block;font-size:0.97em;color:#aaa;'>Moves</span>
        <span style='font-weight:600;color:#444;'>${stone.moves ? stone.moves.length : 0}</span>
      </div>
      <div style='width:1px;height:2.2em;background:#eee;margin:0 0.5em;'></div>
      <div style='flex:1;min-width:80px;max-width:120px;text-align:center;padding:0 0.5em;'>
        <span style='display:block;font-size:0.97em;color:#aaa;'>Distance</span>
        <span style='font-weight:600;color:#444;'>${stone.distance_km} km</span>
      </div>
    </div>
  `;
  
  modalBody.innerHTML = `<div style='background:repeating-linear-gradient(135deg,${color}09 0 12px,transparent 12px 24px);border-radius:18px;padding:1.2rem 0.7rem;'>${html}</div>`;
  modal.style.display = 'flex';
}
document.addEventListener('DOMContentLoaded', function() {
  setupPagination('creations');
  setupPagination('interactions');
  // Update titles with counts and correct pluralization
  const c = creationsData.length;
  const i = interactionsData.length;
  document.getElementById('creations-title').textContent =
    c === 0 ? 'NO CREATIONS' : (c === 1 ? 'MY CREATION' : `MY ${c} CREATIONS`);
  document.getElementById('interactions-title').textContent =
    i === 0 ? 'NO INTERACTIONS' : (i === 1 ? 'MY INTERACTION' : `MY ${i} INTERACTIONS`);
});
</script>

{% endblock %}
