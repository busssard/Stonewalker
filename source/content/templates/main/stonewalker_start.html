{% extends 'layouts/default/page.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<!-- Include Shared Modals -->
{% include 'main/shared_modals.html' %}
<!-- Old create-stone modal removed: stone creation now goes through the shop flow -->

<!-- Welcome Modal for Guests -->
{% if show_welcome_modal %}
<script>
// Guest welcome modal — shows once per hour using localStorage.
// Conditionally rendered by Django template if-tag.
(function() {
  var lastVisitKey = 'stonewalker_guest_last_visit';
  var now = Date.now();
  var lastVisit = parseInt(localStorage.getItem(lastVisitKey) || '0', 10);
  var oneHour = 60 * 60 * 1000;
  
  if (!lastVisit || now - lastVisit > oneHour) {
    // Use the shared welcome modal
    if (window.showWelcomeModal) {
      window.showWelcomeModal();
    }
    
    // Add localStorage functionality to the shared modal close
    var welcomeModal = document.getElementById('welcome-banner-modal');
    var welcomeClose = document.getElementById('welcome-modal-close');
    
    if (welcomeClose) {
      welcomeClose.onclick = function() {
        localStorage.setItem(lastVisitKey, Date.now().toString());
        if (window.closeWelcomeModal) {
          window.closeWelcomeModal();
        }
      };
    }
    
    if (welcomeModal) {
      welcomeModal.onclick = function(e) {
        if (e.target === welcomeModal) {
          localStorage.setItem(lastVisitKey, Date.now().toString());
          if (window.closeWelcomeModal) {
            window.closeWelcomeModal();
          }
        }
      };
    }
  }
})();
</script>
{% endif %}
<!-- Responsive Map Frame Wrapper -->
<div class="h-map-wrapper">
  <div class="main-map-flex-root h-map-container flex-column">
    <div class="avant-card avant-card-map flex-1-auto flex-column">
      <div id="map-container" class="avant-bg-right avant-shadow flex-1-auto position-relative">
        <div id="map" class="flex-1-auto"></div>
        <!-- Filter controls floating overlay (bottom-left of map) -->
        <div class="map-filter-overlay">
          <input type="checkbox" id="filter-all" checked class="filter-toggle-input">
          <label for="filter-all" class="filter-toggle-btn">{% trans 'All' %}</label>
          <input type="checkbox" id="filter-hidden" checked class="filter-toggle-input">
          <label for="filter-hidden" class="filter-toggle-btn filter-has-info" title="{% trans 'Only show stones where only the last found spot is known, not where it moved next' %}">{% trans 'Hidden' %}<span class="filter-info-icon" aria-label="{% trans 'Info' %}">?</span></label>
          <input type="checkbox" id="filter-hunted" checked class="filter-toggle-input">
          <label for="filter-hunted" class="filter-toggle-btn filter-has-info" title="{% trans 'Only show stones with a known location that everyone tries to find first' %}">{% trans 'Hunted' %}<span class="filter-info-icon" aria-label="{% trans 'Info' %}">?</span></label>
        </div>
      </div>
      <div id="stone-details" class="avant-card display-none">
        <!-- Stone details content -->
      </div>
    </div>
  </div>
</div>
<!-- Floating action buttons (styled, side by side, bottom right) -->
<div class="floating-action-bar" role="group" aria-label="{% trans 'Stone actions' %}">
  <button id="add-stone-fab" title="{% trans 'Add new stone' %}" aria-label="{% trans 'Create a new stone' %}" class="avant-btn floating-action-btn primary">
    <img src="{% static 'hold_stone.png' %}" alt="" aria-hidden="true" />
    <span>{% trans 'Create New Stone' %}</span>
  </button>
  <button id="scan-stone-fab" title="{% trans 'I found a stone' %}" aria-label="{% trans 'Scan a stone QR code' %}" class="avant-btn floating-action-btn secondary">
    <img id="scan-stone-icon" src="{% static 'found_stone.png' %}" alt="" aria-hidden="true" />
    <span id="scan-stone-text">{% trans 'Scan a Stone' %}</span>
  </button>
</div>


<script>
// FAB button hover effects and click handlers for the main map page.
// Inline because it uses a Django url tag for navigation.
document.addEventListener('DOMContentLoaded', function() {
  // Shared hover color palette for FAB buttons
  const randomColors = [
    '#ff9800', '#ffb300', '#4CAF50', '#3fa7ff', '#e91e63', '#9c27b0', '#00bcd4', '#8bc34a', '#ffc107', '#ff5722'
  ];
  function pickRandomColor() {
    return randomColors[Math.floor(Math.random() * randomColors.length)];
  }

  // Highlight add-stone-fab in a random color on hover
  const addStoneFab = document.getElementById('add-stone-fab');
  if (addStoneFab) {
    const originalBg = addStoneFab.style.background;
    addStoneFab.addEventListener('mouseenter', function() {
      addStoneFab.style.background = pickRandomColor();
    });
    addStoneFab.addEventListener('mouseleave', function() {
      addStoneFab.style.background = originalBg;
    });

    // Navigate to shop flow (smart router: unclaimed QR -> claim, else -> shop)
    addStoneFab.addEventListener('click', function() {
      window.location.href = '{% url "create_stone" %}';
    });
  }

  // Scan button hover: change border, text, and icon color
  const scanBtn = document.getElementById('scan-stone-fab');
  const scanText = document.getElementById('scan-stone-text');
  const scanIcon = document.getElementById('scan-stone-icon');
  if (scanBtn && scanText && scanIcon) {
    const scanDefaultColor = '#ff9800';
    const scanOriginalFilter = scanIcon.style.filter;
    scanBtn.addEventListener('mouseenter', function() {
      const color = pickRandomColor();
      scanBtn.style.borderColor = color;
      scanText.style.color = color;
      scanIcon.style.filter = `drop-shadow(0 0 0 ${color}) brightness(0) saturate(100%) sepia(1) hue-rotate(0deg)`;
    });
    scanBtn.addEventListener('mouseleave', function() {
      scanBtn.style.borderColor = scanDefaultColor;
      scanText.style.color = scanDefaultColor;
      scanIcon.style.filter = scanOriginalFilter;
    });
    
    // Add click handler to open scan modal
    scanBtn.addEventListener('click', function() {
      if (window.openSharedScanStoneModal) {
        window.openSharedScanStoneModal();
      }
    });
  }
});
</script>

<!-- Shared modals are now included from shared_modals.html -->
  
<script id="stones-data" type="application/json">{{ stones_json|safe }}</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" crossorigin=""></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script type="module">
  // Main world-map initialization: renders Leaflet markers for all stones,
  // draws journey polylines, and handles ?focus=PK_stone deep-linking.
  // Inline because it uses Django static tags for fallback images.
  const stones = JSON.parse(document.getElementById('stones-data').textContent || '[]');
  document.addEventListener('DOMContentLoaded', function() {
    // Clamp to a single world: minZoom keeps the whole globe in view without
    // zooming out to repeating earths, and maxBounds (with full viscosity)
    // stops panning past one world. noWrap on the tile layers prevents repeats.
    var worldBounds = L.latLngBounds([-85, -180], [85, 180]);
    var map = L.map('map', {
      minZoom: 2,
      maxBounds: worldBounds,
      maxBoundsViscosity: 1.0,
      worldCopyJump: false,
    }).setView([30, 10], 3);
    L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg{% if stadia_api_key %}?api_key={{ stadia_api_key }}{% endif %}', {
      maxNativeZoom: 18, maxZoom: 19, noWrap: true,
      attribution: '\u00a9 Stadia Maps \u00a9 Stamen Design \u00a9 OpenStreetMap'
    }).addTo(map);
    // Faint place-name labels on top of the watercolor base (it has none).
    L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_labels/{z}/{x}/{y}.png{% if stadia_api_key %}?api_key={{ stadia_api_key }}{% endif %}', { opacity: 0.5, maxNativeZoom: 18, maxZoom: 19, noWrap: true, attribution: '' }).addTo(map);
    // Cluster overlapping stone markers into a numbered marker. Small radius
    // (~ the 48px icon) so markers only group when they genuinely overlap.
    var clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 45,
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: 17,
    });
    map.addLayer(clusterGroup);
    // Open near the visitor's approximate location (IP-based, no permission
    // prompt) instead of the whole globe. Skipped when a stone is deep-linked.
    if (!new URLSearchParams(window.location.search).has('focus')) {
      fetch('https://get.geojs.io/v1/ip/geo.json')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var lat = parseFloat(d && d.latitude), lon = parseFloat(d && d.longitude);
          if (!isNaN(lat) && !isNaN(lon)) { map.setView([lat, lon], 6); }
        })
        .catch(function() { /* keep the default view */ });
    }
    // Helper to create a custom icon with image and shape
    function createStoneIcon(imgUrl, shape, color) {
      let html = '';
      if (!imgUrl) {
        html = `<div style="width:48px;height:48px;border-radius:50%;border:2.5px solid ${color};background:transparent;"></div>`;
      } else if (shape === 'circle' || !shape) {
        html = `<div style="width:48px;height:48px;border-radius:50%;border:2.5px solid ${color};overflow:hidden;background:#f5f5f5;">
          <img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='/static/stone.png'"/>
        </div>`;
      } else if (shape === 'square') {
        html = `<div style="width:48px;height:48px;border-radius:6px;border:2.5px solid ${color};overflow:hidden;background:#f5f5f5;">
          <img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='/static/stone.png'"/>
        </div>`;
      } else if (shape === 'triangle' || shape === 'star') {
        // Shaped via CSS clip-path on the same robust HTML structure the circle
        // uses (solid backing + image with onerror fallback). The old inline-SVG
        // <image> had no xmlns and no fallback, so it rendered transparent in
        // WebKit when injected through Leaflet's DivIcon innerHTML.
        const clip = shape === 'star'
          ? 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)'
          : 'polygon(50% 4%, 96% 96%, 4% 96%)';
        html = `<div style="position:relative;width:48px;height:48px;">
          <div style="position:absolute;inset:0;background:${color};-webkit-clip-path:${clip};clip-path:${clip};"></div>
          <div style="position:absolute;inset:3px;overflow:hidden;background:#f5f5f5;-webkit-clip-path:${clip};clip-path:${clip};">
            <img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='/static/stone.png'"/>
          </div>
        </div>`;
      }
      return L.divIcon({
        html: html,
        iconSize: [48, 48],
        iconAnchor: [24, 48],
        className: 'stone-map-icon'
      });
    }
    // Group stones by PK_stone
    const markerMap = {};
    const polylineMap = {};
    const stonesData = stones.map(stone => ({
      PK_stone: stone.PK_stone,
      description: stone.description,
      image: stone.image || "{% static 'stone.png' %}",
      created_at: stone.created_at ? new Date(stone.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '',
      username: stone.user || '',
      user_picture: stone.user_picture || "{% static 'user_picture.png' %}",
      distance_km: stone.distance_km || 0,
      stone_type: stone.stone_type || 'hidden',
      moves: (stone.moves || []).map(m => ({
        comment: m.comment,
        image: m.image || '',
        timestamp: m.timestamp || '',
        timestamp_display: m.timestamp_display || '',
        username: m.user || '',
        user_picture: m.user_picture || "{% static 'user_picture.png' %}"
      }))
    }));
    stones.forEach(function(stone) {
      const latlngs = [];
      let color = stone.color || '#4CAF50';
      let shape = stone.shape || 'circle';
      const stoneType = stone.stone_type || 'hidden';
      (stone.moves || []).forEach(function(move) {
        latlngs.push([move.latitude, move.longitude]);
      });
      if (latlngs.length > 0) {
        // Draw journey line
        // White casing under a bold coloured line so the track stays visible
        // against the busy watercolor map.
        const polyline = L.layerGroup([
          L.polyline(latlngs, { color: '#ffffff', weight: 7, opacity: 0.6 }),
          L.polyline(latlngs, { color: color, weight: 4, opacity: 0.95 })
        ]).addTo(map);
        polylineMap[stone.PK_stone] = { layer: polyline, type: stoneType };

        // Place marker at latest location
        const latest = latlngs[latlngs.length - 1];
        const marker = L.marker(latest, {
          icon: createStoneIcon(stone.image || "{% static 'stone.png' %}", shape, color)
        });
        clusterGroup.addLayer(marker);
        markerMap[stone.PK_stone] = { layer: marker, type: stoneType };
        // Leaflet popup with stone preview card
        var popupContent = '<div class="sw-popup">'
          + '<div class="sw-popup-header">'
          + '<img class="sw-popup-thumb" src="' + (stone.image || "{% static 'stone.png' %}") + '" alt="" />'
          + '<div class="sw-popup-info">'
          + '<strong class="sw-popup-name">' + stone.PK_stone + '</strong>'
          + '<span class="sw-popup-meta">' + (stone.user || 'Unknown') + '</span>'
          + '</div></div>'
          + '<div class="sw-popup-stats">'
          + '<span>' + (stone.distance_km || 0).toFixed(1) + ' km traveled</span>'
          + '</div>'
          + '<button class="sw-popup-btn" data-stone="' + stone.PK_stone + '">View Journey</button>'
          + '</div>';
        marker.bindPopup(popupContent, { className: 'sw-popup-container', maxWidth: 240, minWidth: 200 });
        marker.on('popupopen', function(e) {
          var btn = e.popup.getElement().querySelector('.sw-popup-btn');
          if (btn) {
            btn.addEventListener('click', function() {
              map.closePopup();
              import('/static/js/stone-modal.js').then(mod => {
                mod.openStoneModal(stone.PK_stone, color, stonesData);
              });
            });
          }
        });
      }
    });
    // Focus on stone if ?focus=PK_stone in URL
    const urlParams = new URLSearchParams(window.location.search);
    const focusStone = urlParams.get('focus');
    if (focusStone && markerMap[focusStone]) {
      const marker = markerMap[focusStone].layer;
      // The marker may be inside a collapsed cluster; expand to reveal it first.
      clusterGroup.zoomToShowLayer(marker, function() {
        setTimeout(() => marker.fire('click'), 200);
      });
    }

    // Filter functionality
    const filterAll = document.getElementById('filter-all');
    const filterHidden = document.getElementById('filter-hidden');
    const filterHunted = document.getElementById('filter-hunted');

    function applyFilters() {
      const showHidden = filterHidden.checked;
      const showHunted = filterHunted.checked;

      // Update markerMap visibility (add/remove from the cluster group so the
      // numbered counts stay correct as stones are filtered).
      Object.keys(markerMap).forEach(pk => {
        const item = markerMap[pk];
        const shouldShow = (item.type === 'hidden' && showHidden) || (item.type === 'hunted' && showHunted);
        if (shouldShow) {
          clusterGroup.addLayer(item.layer);
        } else {
          clusterGroup.removeLayer(item.layer);
        }
      });

      // Update polylineMap visibility
      Object.keys(polylineMap).forEach(pk => {
        const item = polylineMap[pk];
        const shouldShow = (item.type === 'hidden' && showHidden) || (item.type === 'hunted' && showHunted);
        if (shouldShow) {
          map.addLayer(item.layer);
        } else {
          map.removeLayer(item.layer);
        }
      });
    }

    // "All" checkbox logic
    filterAll.addEventListener('change', function() {
      if (this.checked) {
        filterHidden.checked = true;
        filterHunted.checked = true;
      } else {
        filterHidden.checked = false;
        filterHunted.checked = false;
      }
      applyFilters();
    });

    // Individual filter checkboxes
    filterHidden.addEventListener('change', function() {
      // Update "All" checkbox state
      filterAll.checked = filterHidden.checked && filterHunted.checked;
      applyFilters();
    });

    filterHunted.addEventListener('change', function() {
      // Update "All" checkbox state
      filterAll.checked = filterHidden.checked && filterHunted.checked;
      applyFilters();
    });
  });
</script>
<!-- Old modal JS removed: stone creation now goes through the shop flow -->
{% endblock %}
