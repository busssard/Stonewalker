[build]
  command = "bash build.sh"
  publish = "source"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.9"
  NODE_VERSION = "18"

# Handle Django API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django admin
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django accounts
[[redirects]]
  from = "/accounts/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django stone routes
[[redirects]]
  from = "/stone/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django stonewalker routes
[[redirects]]
  from = "/stonewalker/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django my-stones routes
[[redirects]]
  from = "/my-stones/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django forum, shop, about routes
[[redirects]]
  from = "/forum/*"
  to = "/.netlify/functions/django"
  status = 200

[[redirects]]
  from = "/shop/*"
  to = "/.netlify/functions/django"
  status = 200

[[redirects]]
  from = "/about/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django language routes
[[redirects]]
  from = "/language/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django add_stone routes
[[redirects]]
  from = "/add_stone/*"
  to = "/.netlify/functions/django"
  status = 200

# Handle Django stonescan routes
[[redirects]]
  from = "/stonescan/*"
  to = "/.netlify/functions/django"
  status = 200

# Static files should be served directly
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/media/*"
  to = "/media/:splat"
  status = 200

# Default redirect for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000" 